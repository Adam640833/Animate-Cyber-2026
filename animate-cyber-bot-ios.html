<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AC Bot">
<meta name="theme-color" content="#0A0E14">
<title>Animate Cyber Bot</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Mono:wght@700&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --blue-deep:    #0A0E14;
    --blue-mid:     #0D1B2E;
    --blue-card:    #111C2D;
    --blue-border:  rgba(30,120,210,0.25);
    --blue-bright:  #1E78D2;
    --blue-glow:    #3B9FE8;
    --blue-light:   #5FB4D4;
    --node-dot:     #1A5FAA;
    --text:         #F0F6FF;
    --text-dim:     rgba(240,246,255,0.5);
    --green:        #3DD68C;
    --red:          #F87171;
    --yellow:       #FBBF24;
    --safe-top:     env(safe-area-inset-top, 44px);
    --safe-bottom:  env(safe-area-inset-bottom, 20px);
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--blue-deep);
  }

  body {
    font-family: 'Work Sans', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    position: fixed;
    inset: 0;
  }

  /* ── Animated node-network background ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.35;
  }

  /* ── Header ── */
  .header {
    padding: calc(var(--safe-top) + 6px) 16px 12px;
    background: rgba(10,14,20,0.92);
    border-bottom: 1px solid var(--blue-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }

  .logo-hex {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }

  .header-text { flex: 1; min-width: 0; }

  .header-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1;
  }

  .header-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--blue-glow);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse-dot 2.5s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 rgba(61,214,140,0.5); }
    50% { box-shadow: 0 0 0 5px rgba(61,214,140,0); }
  }

  .branch-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem;
    background: rgba(30,120,210,0.15);
    border: 1px solid rgba(30,120,210,0.3);
    color: var(--blue-glow);
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    z-index: 1;
  }

  /* Prevent rubber-band scroll from showing background */
  #messages::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 100px;
    background: var(--blue-deep);
    z-index: -1;
  }

  .message {
    display: flex;
    gap: 9px;
    align-items: flex-end;
    animation: msgIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.55rem;
    font-weight: 600;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .avatar.bot {
    background: linear-gradient(135deg, var(--blue-bright), var(--blue-glow));
    box-shadow: 0 0 12px rgba(30,120,210,0.4);
  }

  .avatar.user {
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--blue-border);
    color: var(--blue-glow);
  }

  .bubble {
    max-width: calc(100% - 80px);
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 0.88rem;
    line-height: 1.6;
    position: relative;
  }

  .message.bot .bubble {
    background: var(--blue-card);
    border: 1px solid var(--blue-border);
    border-bottom-left-radius: 4px;
  }

  .message.user .bubble {
    background: linear-gradient(135deg, rgba(30,120,210,0.35), rgba(59,159,232,0.25));
    border: 1px solid rgba(30,120,210,0.4);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .bubble.success {
    border-color: rgba(61,214,140,0.35);
    background: rgba(61,214,140,0.05);
  }

  .bubble.error {
    border-color: rgba(248,113,113,0.35);
    background: rgba(248,113,113,0.05);
  }

  .bubble.working {
    border-color: rgba(251,191,36,0.25);
    background: rgba(251,191,36,0.04);
  }

  strong { color: var(--blue-glow); font-weight: 600; }
  code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78em;
    background: rgba(255,255,255,0.07);
    padding: 0.1em 0.4em;
    border-radius: 3px;
    color: #93C5FD;
    word-break: break-all;
  }

  .commit-block {
    margin-top: 10px;
    padding: 10px 12px;
    background: rgba(0,0,0,0.35);
    border-radius: 8px;
    border-left: 3px solid var(--green);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--green);
    line-height: 1.5;
  }

  .commit-label {
    color: var(--text-dim);
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 3px;
  }

  .diff-preview {
    margin-top: 10px;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem;
    line-height: 1.6;
    border: 1px solid rgba(255,255,255,0.06);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .diff-add { color: var(--green); }
  .diff-remove { color: var(--red); }
  .diff-context { color: var(--text-dim); }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 4px 2px;
  }
  .td {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--blue-glow);
    animation: td 1.3s ease-in-out infinite;
  }
  .td:nth-child(2) { animation-delay: 0.15s; }
  .td:nth-child(3) { animation-delay: 0.3s; }
  @keyframes td {
    0%, 60%, 100% { opacity: 0.25; transform: scale(0.85); }
    30% { opacity: 1; transform: scale(1.1); }
  }

  /* Chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 12px;
  }

  .chip {
    padding: 7px 13px;
    background: rgba(30,120,210,0.1);
    border: 1px solid rgba(30,120,210,0.3);
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--blue-glow);
    cursor: pointer;
    -webkit-touch-callout: none;
    user-select: none;
    transition: all 0.15s;
    active: scale(0.96);
  }

  .chip:active {
    background: rgba(30,120,210,0.25);
    transform: scale(0.96);
  }

  /* ── Input bar ── */
  .input-bar {
    padding: 10px 12px calc(var(--safe-bottom) + 8px);
    background: rgba(10,14,20,0.96);
    border-top: 1px solid var(--blue-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    position: relative;
    z-index: 100;
    flex-shrink: 0;
  }

  #userInput {
    flex: 1;
    background: var(--blue-card);
    border: 1px solid var(--blue-border);
    border-radius: 20px;
    padding: 11px 16px;
    color: var(--text);
    font-family: 'Work Sans', sans-serif;
    font-size: 1rem; /* 16px prevents iOS zoom */
    line-height: 1.4;
    outline: none;
    resize: none;
    max-height: 110px;
    min-height: 44px;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }

  #userInput:focus { border-color: var(--blue-bright); }
  #userInput::placeholder { color: rgba(240,246,255,0.2); }

  .icon-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    -webkit-touch-callout: none;
  }

  .icon-btn:active { transform: scale(0.92); }

  #micBtn {
    background: rgba(30,120,210,0.15);
    border: 1px solid rgba(30,120,210,0.35);
    color: var(--blue-glow);
  }

  #micBtn.listening {
    background: rgba(248,113,113,0.2);
    border-color: rgba(248,113,113,0.5);
    color: var(--red);
    animation: mic-pulse 1s ease-in-out infinite;
  }

  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(248,113,113,0); }
  }

  #sendBtn {
    background: linear-gradient(135deg, var(--blue-bright), var(--blue-glow));
    color: white;
    box-shadow: 0 4px 15px rgba(30,120,210,0.4);
  }

  #sendBtn:disabled { opacity: 0.35; box-shadow: none; }

  #sendBtn svg, #micBtn svg { width: 18px; height: 18px; }

  /* ── Mic overlay ── */
  .mic-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,14,20,0.92);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .mic-overlay.active { display: flex; }

  .mic-ring {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: rgba(248,113,113,0.1);
    border: 2px solid rgba(248,113,113,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: ring-pulse 1s ease-in-out infinite;
  }

  @keyframes ring-pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(248,113,113,0.3); }
    50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(248,113,113,0); }
  }

  .mic-ring svg { width: 40px; height: 40px; color: var(--red); }

  .mic-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .mic-transcript {
    font-size: 1.1rem;
    color: var(--text);
    text-align: center;
    max-width: 80%;
    min-height: 2em;
    line-height: 1.5;
  }

  .mic-cancel {
    padding: 12px 32px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 30px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    -webkit-touch-callout: none;
  }
</style>
</head>
<body>

<!-- Animated background canvas -->

<!-- Header -->

<script>
// ── Config ──────────────────────────────────────────────────────
const GITHUB_TOKEN = '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';
const REPO_OWNER   = 'Adam640833';
const REPO_NAME    = 'A-C-W-3-14-26';
const BRANCH       = 'main';
const FILE_PATH    = 'index.html';

// ── Node network background ─────────────────────────────────────
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let nodes = [], W, H, raf;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function init() {
    resize();
    nodes = Array.from({length: 28}, () => ({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 2 + 1.5
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    });
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x, dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 130) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(30,120,210,${0.4 * (1 - dist/130)})`;
          ctx.lineWidth = 0.8;
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }
    }
    nodes.forEach(n => {
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(59,159,232,0.6)';
      ctx.fill();
    });
    raf = requestAnimationFrame(draw);
  }

  init(); draw();
  window.addEventListener('resize', init);
})();

// ── State ───────────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const userInput  = document.getElementById('userInput');
const sendBtn    = document.getElementById('sendBtn');
const micBtn     = document.getElementById('micBtn');
const micOverlay = document.getElementById('micOverlay');
const micTransEl = document.getElementById('micTranscript');
const micCancel  = document.getElementById('micCancel');

let history        = [];
let currentSHA     = null;
let currentContent = null;
let isBusy         = false;
let recognition    = null;

// ── Rendering ───────────────────────────────────────────────────
function addMsg(role, html, type = '') {
  const wrap = document.createElement('div');
  wrap.className = `message ${role}`;
  const av = document.createElement('div');
  av.className = `avatar ${role}`;
  av.textContent = role === 'bot' ? 'AC' : 'YOU';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${type}`;
  bubble.innerHTML = html;
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'message bot'; wrap.id = 'typing';
  wrap.innerHTML = `<div class="avatar bot">AC</div><div class="bubble"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  messagesEl.appendChild(wrap);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function chips(items) {
  return `<div class="chips">${items.map(c =>
    `<div class="chip" onclick="sendChip('${c.replace(/'/g,"\\'")}');event.stopPropagation()">${c}</div>`
  ).join('')}</div>`;
}
window.sendChip = t => { userInput.value = t; handleSend(); };

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── GitHub API ──────────────────────────────────────────────────
async function fetchFile() {
  const r = await fetch(
    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}?ref=${BRANCH}`,
    { headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json' } }
  );
  if (!r.ok) throw new Error(`GitHub ${r.status}`);
  const d = await r.json();
  currentSHA     = d.sha;
  currentContent = decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))));
  return currentContent;
}

async function commitFile(content, msg) {
  const r = await fetch(
    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`,
    {
      method: 'PUT',
      headers: { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, content: btoa(unescape(encodeURIComponent(content))), sha: currentSHA, branch: BRANCH })
    }
  );
  if (!r.ok) throw new Error(`GitHub ${r.status}: ${await r.text()}`);
  const d = await r.json();
  currentSHA = d.content.sha;
  currentContent = content;
  return d.commit.sha;
}

// ── Claude API ──────────────────────────────────────────────────
async function callClaude(userMsg, html) {
  const sys = `You are a website editor for Animate Cyber (animatecyber.com) — a cybersecurity training company. You help the user update their single-page HTML website.

Respond ONLY with valid JSON (no markdown, no backticks). Use one of these formats:

For making edits:
{"intent":"what you understood","changes":[{"description":"what changes","old":"EXACT verbatim substring from HTML","new":"replacement"}],"commitMessage":"feat: brief description","summary":"friendly confirmation"}

For conversation/unclear:
{"action":"chat","message":"your response"}

For clarification needed:
{"action":"clarify","question":"your question"}

Rules: "old" must be an exact verbatim substring of the provided HTML. Make minimal surgical changes only. Never include the full HTML in your response.`;

  const msgs = [
    ...history,
    { role: 'user', content: `HTML (first 8000 chars):\n${html.substring(0,8000)}\n\nRequest: ${userMsg}` }
  ];

  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: sys, messages: msgs })
  });
  if (!r.ok) throw new Error(`Claude ${r.status}`);
  const d = await r.json();
  const text = d.content.map(b => b.text||'').join('').replace(/```json|```/g,'').trim();
  return JSON.parse(text);
}

// ── Main handler ────────────────────────────────────────────────
async function handleSend() {
  const text = userInput.value.trim();
  if (!text || isBusy) return;
  isBusy = true; sendBtn.disabled = true;
  userInput.value = ''; userInput.style.height = 'auto';
  addMsg('user', esc(text));
  showTyping();

  try {
    let html;
    try { html = await fetchFile(); }
    catch(e) {
      hideTyping();
      addMsg('bot', `⚠️ <strong>Can't reach GitHub.</strong><br><code>${esc(e.message)}</code>`, 'error');
      isBusy = false; sendBtn.disabled = false; return;
    }

    let parsed;
    try { parsed = await callClaude(text, html); }
    catch(e) {
      hideTyping();
      addMsg('bot', `⚠️ <strong>AI error.</strong> ${esc(e.message)}`, 'error');
      isBusy = false; sendBtn.disabled = false; return;
    }

    hideTyping();

    if (parsed.action === 'chat') {
      addMsg('bot', parsed.message);
      history.push({role:'user',content:text},{role:'assistant',content:parsed.message});

    } else if (parsed.action === 'clarify') {
      addMsg('bot', `🤔 ${parsed.question}`);

    } else if (parsed.changes?.length) {
      let updated = html;
      let diffLines = [];
      let ok = true;

      for (const c of parsed.changes) {
        if (!updated.includes(c.old)) {
          addMsg('bot', `⚠️ Couldn't find the text to replace:<br><code>${esc(c.old.substring(0,80))}…</code><br><br>Try being more specific about the section.`, 'error');
          ok = false; break;
        }
        diffLines.push(`<div class="diff-remove">- ${esc(c.old.substring(0,70).replace(/\n/g,'↵'))}${c.old.length>70?'…':''}</div>`);
        diffLines.push(`<div class="diff-add">+ ${esc(c.new.substring(0,70).replace(/\n/g,'↵'))}${c.new.length>70?'…':''}</div>`);
        updated = updated.split(c.old).join(c.new);
      }

      if (!ok) { isBusy = false; sendBtn.disabled = false; return; }

      const wb = addMsg('bot', `⏳ <strong>Committing ${parsed.changes.length} change${parsed.changes.length>1?'s':''}…</strong>`, 'working');

      try {
        const sha = await commitFile(updated, parsed.commitMessage);
        wb.className = 'bubble success';
        wb.innerHTML = `
          ✅ <strong>${esc(parsed.summary || 'Done!')}</strong>
          <div class="diff-preview">${diffLines.join('')}</div>
          <div class="commit-block">
            <div class="commit-label">Commit</div>
            ${sha.substring(0,12)} — ${esc(parsed.commitMessage)}
          </div>
          ${chips(['Make another change','Undo last change','What else can I change?'])}`;
        history.push({role:'user',content:text},{role:'assistant',content:parsed.summary});
      } catch(e) {
        wb.className = 'bubble error';
        wb.innerHTML = `❌ <strong>Commit failed.</strong><br>${esc(e.message)}`;
      }

    } else {
      addMsg('bot', "I understood your request but couldn't figure out exactly what to change. Try something like: <em>\"Change the hero headline to X\"</em>");
    }

  } catch(e) {
    hideTyping();
    addMsg('bot', `Unexpected error: ${esc(e.message)}`, 'error');
  }

  isBusy = false; sendBtn.disabled = false;
}

// ── Voice input ─────────────────────────────────────────────────
function setupVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    micBtn.addEventListener('click', () =>
      addMsg('bot', '🎙️ Voice input isn\'t supported in this browser. Try Safari on iOS 14.5+.')
    );
    return;
  }

  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  let finalTranscript = '';

  recognition.onstart = () => {
    finalTranscript = '';
    micTransEl.textContent = 'Speak your change request';
    micOverlay.classList.add('active');
    micBtn.classList.add('listening');
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    micTransEl.textContent = finalTranscript || interim || 'Listening…';
  };

  recognition.onend = () => {
    micOverlay.classList.remove('active');
    micBtn.classList.remove('listening');
    if (finalTranscript.trim()) {
      userInput.value = finalTranscript.trim();
      handleSend();
    }
  };

  recognition.onerror = (e) => {
    micOverlay.classList.remove('active');
    micBtn.classList.remove('listening');
    if (e.error !== 'aborted')
      addMsg('bot', `🎙️ Mic error: ${e.error}. Make sure microphone access is allowed in Safari Settings.`);
  };

  micBtn.addEventListener('click', () => {
    if (micBtn.classList.contains('listening')) {
      recognition.stop();
    } else {
      recognition.start();
    }
  });

  micCancel.addEventListener('click', () => { recognition.abort(); });
}

setupVoice();

// ── Input events ────────────────────────────────────────────────
sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
userInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});

// Prevent body scroll when input focused (iOS keyboard handling)
userInput.addEventListener('focus', () => {
  setTimeout(() => messagesEl.scrollTop = messagesEl.scrollHeight, 300);
});
